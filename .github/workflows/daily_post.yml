name: Daily Video Generation (Veo → Drive)

# 毎日 20:00 JST = 11:00 UTC（YouTube 投稿の 2.5 時間前に生成しておく）
on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # Veo の生成は最大 10 分程度

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate video and save to Drive
        env:
          GEMINI_API_KEY:            ${{ secrets.GEMINI_API_KEY }}
          DRIVE_TOKEN_JSON:          ${{ secrets.DRIVE_TOKEN_JSON }}
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
          GH_PAT:                    ${{ secrets.GH_PAT }}
        run: python generate_video.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-log-${{ github.run_id }}
          path: "*.log"
          if-no-files-found: ignore
          retention-days: 7
